apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: ops-app2-dev

images:
- name: ops-app2
  newName: bovo22/ops-app2
  newTag: sha-5ba5bda

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: ops-app2

configMapGenerator:
- behavior: merge
  literals:
  - PROFILE=dev
  name: ops-app2-config
