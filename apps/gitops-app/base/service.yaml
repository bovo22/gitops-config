apiVersion: v1
kind: Service
metadata:
  name: spring-boot-svc
  labels:
    app: gitops-app
spec:
  type: ClusterIP
  selector:
    app: gitops-app # Deployment 의 label 과 일치해야 함
  ports:
    - port: 80 # 서비스 포트 (외부에서 접근하는 포트)
      targetPort: 800 # 컨테이너 포트 (Pod 내부 포트)
      protocol: TCP
      name: http
