# apps/spring-boot/plain/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: spring-boot-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
  spec:
    containers:
      - name: gitops-app
        image: gitops-app
        ports:
          - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # ⭕ 수정됨: resources 밖으로 꺼내어 들여쓰기 정렬
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10 # ⭕ 수정됨: peroid -> period 오타 수정
        # ⭕ 수정됨: resources 밖으로 꺼내어 들여쓰기 정렬
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
