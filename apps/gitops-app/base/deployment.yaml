# apps/spring-boot/plain/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: spring-boot-dev # 네임스페이스 명시
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          # : nginx 테스트 이미지 사용
          image: gitops-app
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m" # 최소 0.1 코어
              memory: "256Mi" # 최소 256MB
            limits:
              cpu: "500m" # 최대 0.25 코어
              memory: "512Mi" # 최대 512MB
            readinessProbe:
              httpGet:
                path: /api/health
                port: 8080
              initialDelaySeconds: 40
              peroidSeconds: 10
            livenessProbe:
              httpGet:
